name: Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio mypy ruff black pip-audit

      - name: Type checking (mypy)
        run: mypy ollama/ --strict

      - name: Linting (ruff)
        run: ruff check ollama/ tests/

      - name: Code format check (black)
        run: black --check ollama/ tests/

      - name: Security audit (pip-audit)
        run: pip-audit --desc
        continue-on-error: true

      - name: Run tests
        run: pytest tests/unit/ -v --cov=ollama --cov-report=xml --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage.xml', 'utf8');

            let comment = '## ✅ Quality Checks Passed\n\n';
            comment += '| Check | Status |\n';
            comment += '|-------|--------|\n';
            comment += '| Type Checking | ✅ Passed |\n';
            comment += '| Linting | ✅ Passed |\n';
            comment += '| Code Format | ✅ Passed |\n';
            comment += '| Unit Tests | ✅ Passed |\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
