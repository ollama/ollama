name: Build and Release s390x

on:
  push:
    tags:
      - 'v*'

jobs:
  build-s390x:
    name: Build ollama for s390x
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for s390x cross-compilation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: s390x

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ollama binary inside s390x container
        run: |
          docker run --rm --platform linux/s390x \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            golang:1.24-bookworm \
            bash -c "
              apt-get update -qq && apt-get install -y -qq cmake build-essential &&
              cmake -B build . &&
              cmake --build build --parallel \$(nproc) &&
              mkdir -p /workspace/dist/usr/local/bin &&
              cp ollama /workspace/dist/usr/local/bin/ollama
            "

      - name: Package binary as ollama-linux-s390x.tgz
        run: |
          cd dist
          tar -czf ../ollama-linux-s390x.tgz usr/
          cd ..
          sha256sum ollama-linux-s390x.tgz > ollama-linux-s390x.tgz.sha256

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ollama-linux-s390x.tgz
            ollama-linux-s390x.tgz.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
