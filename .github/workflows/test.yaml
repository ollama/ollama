name: test

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**/*'

jobs:
  windows-openmp-runtime-probe:
    runs-on: windows
    steps:
      - uses: actions/checkout@v4

      - name: Install minimal system dependencies
        run: |
          choco install -y --no-progress ninja

      - name: Build and inspect Windows CPU runtime dependencies
        run: |
          $ErrorActionPreference = "Stop"

          Import-Module 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\Microsoft.VisualStudio.DevShell.dll'
          Enter-VsDevShell -VsInstallPath 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise' -SkipAutomaticLocation -DevCmdArguments '-arch=x64 -no_logo'

          # Match the release CPU dependency build: clang-cl frontend, Ninja generator.
          $env:CC = "clang.exe"
          $env:CXX = "clang++.exe"
          $env:CMAKE_GENERATOR = "Ninja"
          $installPrefix = "$((pwd).Path)\dist\windows-openmp-probe"
          $libDir = Join-Path $installPrefix 'lib\ollama'

          Write-Host "=== Toolchain ==="
          Write-Host "CC=$env:CC"
          Write-Host "CXX=$env:CXX"
          Write-Host "CMAKE_GENERATOR=$env:CMAKE_GENERATOR"
          Write-Host "VCToolsInstallDir=$env:VCToolsInstallDir"
          Write-Host "VCToolsRedistDir=$env:VCToolsRedistDir"
          Write-Host "VisualStudioVersion=$env:VisualStudioVersion"
          Write-Host "VSINSTALLDIR=$env:VSINSTALLDIR"
          where.exe clang.exe
          where.exe clang++.exe
          where.exe cl.exe
          where.exe dumpbin.exe
          where.exe cmake.exe
          where.exe ninja.exe
          clang.exe --version
          cmake.exe --version
          ninja.exe --version

          Write-Host "=== Candidate OpenMP runtime DLLs under Visual Studio redist/tools directories ==="
          $candidateRoots = @(
            $env:VCToolsRedistDir,
            $env:VCToolsInstallDir,
            (Join-Path $env:VSINSTALLDIR 'VC\Redist'),
            (Join-Path $env:VSINSTALLDIR 'VC\Tools')
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique
          foreach ($root in $candidateRoots) {
            Write-Host "--- $root"
            Get-ChildItem $root -Recurse -File -Include '*omp*.dll','vcomp*.dll' -ErrorAction SilentlyContinue |
              Select-Object -ExpandProperty FullName |
              Sort-Object
          }

          Write-Host "=== CMake configure ==="
          cmake -S llama\server --preset cpu --install-prefix "$installPrefix" --trace-expand --trace-source=llama/server/CMakeLists.txt

          Write-Host "=== CMake cache runtime/compiler entries ==="
          Get-Content build\llama-server-cpu\CMakeCache.txt |
            Select-String -Pattern 'CMAKE_(C|CXX)_COMPILER|OpenMP|OMP|VCTools|REDIST|RUNTIME|INSTALL_PREFIX|OLLAMA' |
            ForEach-Object { $_.Line }

          Write-Host "=== Build ==="
          cmake --build build\llama-server-cpu --verbose -- -l $([Environment]::ProcessorCount)

          Write-Host "=== Install ==="
          cmake --install build\llama-server-cpu --component llama-server --strip --verbose

          Write-Host "=== Installed files ==="
          Get-ChildItem $libDir -Recurse -File |
            Select-Object FullName, Length |
            Sort-Object FullName |
            Format-Table -AutoSize

          Write-Host "=== Installed OpenMP runtime files ==="
          Get-ChildItem $libDir -Recurse -File -Include '*omp*.dll','vcomp*.dll' -ErrorAction SilentlyContinue |
            Select-Object FullName, Length |
            Sort-Object FullName |
            Format-Table -AutoSize

          Write-Host "=== CPU backend import tables ==="
          $missing = @()
          Get-ChildItem $libDir -File -Filter 'ggml-cpu-*.dll' | ForEach-Object {
            Write-Host "--- $($_.Name)"
            $deps = & dumpbin /dependents $_.FullName
            $deps | Write-Host
            $runtimeDeps = $deps |
              Select-String -Pattern '^\s+(libomp[^ ]*\.dll|vcomp[^ ]*\.dll)\s*$' |
              ForEach-Object { $_.Matches[0].Groups[1].Value }
            foreach ($dep in $runtimeDeps) {
              if (-not (Test-Path (Join-Path $libDir $dep))) {
                $missing += "$($_.Name) imports $dep but $dep is absent from $libDir"
              }
            }
          }

          if ($missing.Count -gt 0) {
            Write-Host "=== Missing packaged runtime dependencies ==="
            $missing | ForEach-Object { Write-Host $_ }
            exit 1
          }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-openmp-runtime-probe
          path: dist/windows-openmp-probe
