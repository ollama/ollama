name: docker-build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:

permissions:
  id-token: write
  contents: read
  actions: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Dockerfile
        uses: docker/build-push-action@v6
        with:
          context: .
          # Push layers to ghcr as they build, and also load the image into the
          # local daemon so the verify/extract steps below can use it.
          push: true
          load: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Store/read the build layer cache in ghcr so subsequent runs reuse it.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
      - name: Verify ollama binary
        run: docker run --rm ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }} --version
      - name: Extract binary
        run: |
          docker create --name extract ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
          mkdir -p dist
          docker cp extract:/usr/bin/ollama dist/ollama_linux_amd64
          docker rm extract
      - uses: actions/upload-artifact@v4
        with:
          name: go-build
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: wow-look-at-my/buildhost/.github/actions/buildhost-publish@master
