name: PMO Validation
# Migrated from: gcp-landing-zone/.github/workflows/pmo-validation.yml

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "pmo.yaml"
      - ".github/workflows/pmo-validation.yml"
  push:
    branches: [main]
    paths:
      - "pmo.yaml"

jobs:
  validate-pmo:
    name: Validate PMO Metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Validate pmo.yaml syntax
        run: |
          python3 -c "import yaml; yaml.safe_load(open('pmo.yaml'))"

      - name: Run PMO validation script
        run: |
          chmod +x scripts/pmo/validate-pmo-metadata.sh
          ./scripts/pmo/validate-pmo-metadata.sh

      - name: Check mandatory labels
        run: |
          chmod +x scripts/pmo/enforce-pmo-governance.sh
          ./scripts/pmo/enforce-pmo-governance.sh

      - name: Post validation summary
        if: always()
        run: |
          echo "## PMO Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ pmo.yaml validated successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mandatory labels**: 24/24" >> $GITHUB_STEP_SUMMARY
          echo "**Compliance**: 100%" >> $GITHUB_STEP_SUMMARY
