name: Generate Architecture Diagrams

on:
  push:
    paths:
      - "docker/terraform/*.tf"
      - "scripts/generate_architecture_diagrams.py"
      - ".github/workflows/diagrams.yml"
    branches:
      - main
      - develop

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install diagrams graphviz

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Generate diagrams
        run: python scripts/generate_architecture_diagrams.py --verbose

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain docs/diagrams/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push diagrams
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Copilot"
          git config user.email "github-copilot@github.com"
          git add docs/diagrams/
          git commit -S -m "chore(diagrams): auto-update architecture diagrams from Terraform changes"
          git push origin HEAD

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true' && github.event_name == 'push'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore(diagrams): auto-update architecture diagrams"
          title: "chore: Update architecture diagrams from Terraform changes"
          body: |
            ## Auto-generated Architecture Diagrams

            Terraform files have changed. Architecture diagrams have been automatically regenerated.

            ### Diagrams Updated
            - ✅ Deployment Topology (primary + secondary regions, MIGs, LB)
            - ✅ Service Architecture (API, database, cache, inference)
            - ✅ Data Flow (request/response paths)
            - ✅ Failover Flow (health checks, automatic switchover)

            ### How to Review
            1. Check `docs/diagrams/` directory for updated diagrams
            2. Verify diagrams match intended Terraform changes
            3. Approve and merge if diagrams are correct

            ### Files Changed
            - Generated from: `docker/terraform/*.tf`
            - Generated by: `scripts/generate_architecture_diagrams.py`
            - Output: `docs/diagrams/`

            ---
            *This PR was automatically generated by GitHub Actions*
          branch: auto/update-diagrams
          delete-branch: true
          labels: |
            automation
            documentation
            diagrams
