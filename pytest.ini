[pytest]
# Pytest Configuration - Comprehensive Test Coverage Framework
# Issue #57: Comprehensive Test Coverage

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum coverage threshold: 95%
addopts =
    --cov=api
    --cov=server
    --cov=cmd
    --cov=internal
    --cov-fail-under=95
    --cov-report=term-missing
    --cov-report=html
    --cov-report=json
    --strict-markers
    -v
    --tb=short

# Test markers
markers =
    unit: Unit tests for individual components
    integration: Integration tests spanning multiple components
    e2e: End-to-end tests covering full workflows
    critical: Critical path tests (must pass)
    slow: Tests that take >5 seconds
    api: Tests for REST API endpoints
    stress: Stress and performance tests
    security: Security-focused tests

# Coverage configuration
[coverage:run]
source = api,server,cmd,internal
branch = True
parallel = True

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Exclude from coverage
omit =
    */tests/*
    */test_*.py
    */__init__.py
    */migrations/*
    */.venv/*

[coverage:html]
directory = htmlcov
