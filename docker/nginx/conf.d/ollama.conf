# ============================================================================
# Ollama API - Main Application Server
# Local access via nginx reverse proxy
# ============================================================================

upstream ollama_api {
    least_conn;
    server ollama-api:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream grafana_backend {
    server grafana:3000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ============================================================================
# HTTP Server - Redirect to HTTPS (when behind GCP LB)
# ============================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow health checks from GCP LB
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# HTTPS Server - Main Application (TLS terminated at GCP LB)
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name localhost elevatediq.ai;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Rate Limiting
    limit_req zone=general_limit burst=50 nodelay;
    limit_conn conn_limit 20;

    # ========================================================================
    # Ollama API Routes
    # ========================================================================
    location /api/v1 {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://ollama_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running AI inference
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # WebSocket support (for streaming)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://ollama_api/health;
        proxy_set_header Host $host;
    }

    # Metrics endpoint (restricted)
    location /metrics {
        access_log off;
        allow 172.25.0.0/16;  # Internal network only
        deny all;
        proxy_pass http://ollama_api/metrics;
    }

    # Documentation
    location /docs {
        proxy_pass http://ollama_api/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://ollama_api/redoc;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://ollama_api/openapi.json;
        proxy_set_header Host $host;
    }

    # ========================================================================
    # Grafana Routes
    # ========================================================================
    location /grafana/ {
        rewrite ^/grafana/(.*) /$1 break;
        proxy_pass http://grafana_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana API
    location /grafana/api/ {
        proxy_pass http://grafana_backend;
        proxy_set_header Host $host;
    }

    # ========================================================================
    # Static Assets (if any)
    # ========================================================================
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ========================================================================
    # Default - API Root
    # ========================================================================
    location / {
        proxy_pass http://ollama_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================================================
    # Error Pages
    # ========================================================================
    error_page 404 /404.html;
    location = /404.html {
        internal;
        return 404 '{"error": "Not Found"}';
        add_header Content-Type application/json;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        return 500 '{"error": "Internal Server Error"}';
        add_header Content-Type application/json;
    }
}

# ============================================================================
# Monitoring Endpoints (Internal Only)
# ============================================================================
server {
    listen 8080;
    server_name localhost;

    access_log off;

    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.25.0.0/16;
        deny all;
    }

    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
